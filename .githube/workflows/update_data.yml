name: Atualizar Dados Radar

on:
  schedule:
    - cron: '0 3 * * *' # Roda às 3h da manhã todos os dias
  workflow_dispatch: # Permite rodar manualmente com um botão

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v3

      - name: Instalar o Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar bibliotecas
        run: pip install -r requirements.txt

      - name: Rodar o Radar de Notícias
        run: python scraper.py

      - name: Salvar o CSV no repositório
        run: |
          git config --global user.name "Robo DICOM"
          git config --global user.email "robo@dicom.ifbaiano"
          git add data/noticias_if.csv
          git commit -m "⚙️ Atualização automática do Radar" || exit 0
          git push
